name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy data_quality_gate

      - name: Unit tests with branch coverage
        run: |
          python -m pytest -m "not integration" -W error \
            --cov=data_quality_gate \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=85

      - name: Start PostgreSQL source and target
        run: docker compose up -d source-db target-db

      - name: Wait for PostgreSQL healthchecks
        run: |
          for service in source-db target-db; do
            echo "Waiting for ${service}..."
            for attempt in {1..60}; do
              container_id="$(docker compose ps -q "${service}")"
              health_status="$(docker inspect --format '{{.State.Health.Status}}' "${container_id}")"
              if [ "${health_status}" = "healthy" ]; then
                echo "${service} is healthy"
                break
              fi
              if [ "${attempt}" -eq 60 ]; then
                docker compose ps
                docker compose logs "${service}"
                echo "${service} did not become healthy"
                exit 1
              fi
              sleep 2
            done
          done

      - name: Integration tests
        env:
          DQG_SOURCE_DB_URL: postgresql+psycopg://dqg_demo:dqg_demo_password@localhost:5433/source_db
          DQG_TARGET_DB_URL: postgresql+psycopg://dqg_demo:dqg_demo_password@localhost:5434/target_db
        run: python -m pytest -m integration -W error

      - name: Runtime smoke test
        env:
          DQG_SOURCE_DB_URL: postgresql+psycopg://dqg_demo:dqg_demo_password@localhost:5433/source_db
          DQG_TARGET_DB_URL: postgresql+psycopg://dqg_demo:dqg_demo_password@localhost:5434/target_db
        run: |
          mkdir -p reports
          rm -f reports/*.json reports/*.html

          data-quality-gate validate migration.yaml

          set +e
          output="$(data-quality-gate run migration.yaml 2>&1)"
          exit_code=$?
          set -e

          printf '%s\n' "${output}"
          test "${exit_code}" -eq 2
          printf '%s\n' "${output}" | grep -F "Status: FAIL"
          printf '%s\n' "${output}" | grep -F "Deployment decision: BLOCK"

          json_file="$(find reports -maxdepth 1 -type f -name '*.json' | sort | head -n 1)"
          html_file="$(find reports -maxdepth 1 -type f -name '*.html' | sort | head -n 1)"
          test -n "${json_file}"
          test -n "${html_file}"
          test "$(find reports -maxdepth 1 -type f -name '*.json' | wc -l)" -eq 1
          test "$(find reports -maxdepth 1 -type f -name '*.html' | wc -l)" -eq 1
          test "${json_file%.json}" = "${html_file%.html}"
          git check-ignore -q "${json_file}"
          git check-ignore -q "${html_file}"
          rm -f reports/*.json reports/*.html

      - name: Stop PostgreSQL source and target
        if: always()
        run: docker compose down --volumes --remove-orphans

      - name: Build wheel and sdist
        run: |
          python -m build
          test -f dist/data_migration_quality_gate-0.1.0-py3-none-any.whl
          test -f dist/data_migration_quality_gate-0.1.0.tar.gz

      - name: Install wheel in clean virtualenv
        run: |
          python -m venv /tmp/dqg-wheel-test
          /tmp/dqg-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/dqg-wheel-test/bin/python -m pip install dist/data_migration_quality_gate-0.1.0-py3-none-any.whl
          version_output="$(/tmp/dqg-wheel-test/bin/data-quality-gate --version)"
          test "${version_output}" = "data-quality-gate 0.1.0"
          /tmp/dqg-wheel-test/bin/data-quality-gate validate migration.yaml

      - name: Docker build
        run: docker build -t data-migration-quality-gate:0.1.0 .

      - name: Docker smoke test
        run: |
          docker_output="$(docker run --rm data-migration-quality-gate:0.1.0 --version)"
          test "${docker_output}" = "data-quality-gate 0.1.0"
          container_user="$(docker run --rm --entrypoint id data-migration-quality-gate:0.1.0 -u)"
          test "${container_user}" != "0"
