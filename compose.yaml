services:
  source-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: ${DQG_POSTGRES_USER:-dqg_demo}
      POSTGRES_PASSWORD: ${DQG_POSTGRES_PASSWORD:-dqg_demo_password}
    ports:
      - "5433:5432"
    volumes:
      - source-db-data:/var/lib/postgresql/data
      - ./docker/source:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d source_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  target-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: target_db
      POSTGRES_USER: ${DQG_POSTGRES_USER:-dqg_demo}
      POSTGRES_PASSWORD: ${DQG_POSTGRES_PASSWORD:-dqg_demo_password}
    ports:
      - "5434:5432"
    volumes:
      - target-db-data:/var/lib/postgresql/data
      - ./docker/target:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d target_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  quality-gate:
    build: .
    image: data-migration-quality-gate:0.1.0
    profiles:
      - runner
    depends_on:
      source-db:
        condition: service_healthy
      target-db:
        condition: service_healthy
    environment:
      DQG_SOURCE_DB_URL: postgresql+psycopg://dqg_demo:dqg_demo_password@source-db:5432/source_db
      DQG_TARGET_DB_URL: postgresql+psycopg://dqg_demo:dqg_demo_password@target-db:5432/target_db
    volumes:
      - ./migration.yaml:/app/migration.yaml:ro
      - ./reports:/app/reports

volumes:
  source-db-data:
  target-db-data:
